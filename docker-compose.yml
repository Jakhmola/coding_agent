services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: coding-agent-llama-cpp
    ports:
      - "8080:8080"
    volumes:
      - llama-cache:/root/.cache
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - --hf-repo
      - WithinUsAI/Opus4.7-GODs.Ghost.Codex-4B.GGuF
      - --hf-file
      - Opus4.7-Distill-GODsGhost-Codex-4B-Q5_K_M.gguf
      - --alias
      - opus-ghost-codex-4b-q5
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-4096}"
      - --n-gpu-layers
      - all
      - --jinja
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]

volumes:
  llama-cache:
